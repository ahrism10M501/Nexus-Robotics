name: Core environment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: "1"

jobs:
  static:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Remove preinstalled Docker data
        run: |
          docker system prune --all --force --volumes
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
          buildkitd-flags: --debug
      - uses: docker/setup-compose-action@2fe291b7677a45ee1269ec56a42604c143505e7e
        with:
          version: v2.30.3
      - name: Verify Compose version
        run: test "$(docker compose version --short)" = '2.30.3'
      - name: Run static core checks
        run: bash tests/run_all.bash --checks

  build-amd64:
    needs: static
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Remove preinstalled Docker data
        run: |
          docker system prune --all --force --volumes
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
          buildkitd-flags: --debug
      - name: Build and load amd64 core image
        run: docker buildx build --pull --platform linux/amd64 --target ros-python-dev --load --tag nexus-core-ci:amd64 .
      - name: Release Buildx cache
        run: |
          docker buildx prune --all --force
      - name: Inspect amd64 image
        run: test "$(docker image inspect --format '{{.Os}}/{{.Architecture}}' nexus-core-ci:amd64)" = 'linux/amd64'
      - name: Smoke amd64 core image
        timeout-minutes: 10
        run: bash tests/smoke_core_image.bash linux/amd64 nexus-core-ci:amd64 x86_64
      - name: Report runner storage after failure
        if: failure()
        run: |
          df -h
          docker system df

  build-arm64:
    needs: static
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Remove preinstalled Docker data
        run: |
          docker system prune --all --force --volumes
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
          buildkitd-flags: --debug
      - name: Build and load arm64 core image
        run: docker buildx build --pull --platform linux/arm64 --target ros-python-dev --load --tag nexus-core-ci:arm64 .
      - name: Release Buildx cache
        run: |
          docker buildx prune --all --force
      - name: Inspect arm64 image
        run: test "$(docker image inspect --format '{{.Os}}/{{.Architecture}}' nexus-core-ci:arm64)" = 'linux/arm64'
      - name: Smoke arm64 core image
        timeout-minutes: 15
        run: bash tests/smoke_core_image.bash linux/arm64 nexus-core-ci:arm64 aarch64
      - name: Report runner storage after failure
        if: failure()
        run: |
          df -h
          docker system df
